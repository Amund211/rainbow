name: Test and build

permissions:
    contents: read

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    lint-and-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Install pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
            - name: Set up Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint:check

            - name: Unit tests
              run: pnpm run test:unit

            - name: Build
              env:
                  # Upload source maps on every build
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
              run: pnpm run build

            - name: Check route tree is up to date
              run: |
                  if ! git diff --exit-code src/routeTree.gen.ts; then
                      echo "Error: The route tree file (src/routeTree.gen.ts) is not up to date."
                      echo "Run 'pnpm run build' and commit the changes."
                      exit 1
                  fi
                  echo "Route tree is up to date ✓"

            - name: Check node types
              run: pnpm run tsc:node

    ui-tests:
        runs-on: ubuntu-latest
        container:
            # https://mcr.microsoft.com/en-us/artifact/mar/playwright/tags
            image: mcr.microsoft.com/playwright:v1.58.2-noble
            options: --ipc=host
        strategy:
            matrix:
                browser: [chromium, webkit]
                shard: [1, 2, 3]
            fail-fast: false
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Install pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
            - name: Set up Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Test
              timeout-minutes: 10
              run: pnpm run test:ui:${{ matrix.browser }} --shard=${{ matrix.shard }}/3
