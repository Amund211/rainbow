version: 2

updates:
    - package-ecosystem: "pre-commit"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"
      groups:
          # Group minor+patch updates together; major & security stay separate
          pre-commit-minor:
              applies-to: "version-updates"
              update-types:
                  - "patch"
                  - "minor"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"

    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"
      groups:
          # Group minor+patch npm updates together; major & security stay separate
          minor-updates:
              applies-to: "version-updates"
              update-types:
                  - "patch"
                  - "minor"
              exclude-patterns:
                  # Requires keeping in sync with pre-commit; often requires manual intervention to fix new rules
                  - "oxlint"
                  # Requires keeping in sync with pre-commit
                  - "oxfmt"
