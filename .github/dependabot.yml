version: 2

updates:
    - package-ecosystem: "pre-commit"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"
      ignore:
          # oxlint/oxfmt are driven by the npm ecosystem (package.json is the source of
          # truth) and synced into .pre-commit-config.yaml by the check-tool-versions
          # workflow, so don't let pre-commit bump them independently.
          - dependency-name: "oxc-project/mirrors-oxlint"
          - dependency-name: "oxc-project/mirrors-oxfmt"
      groups:
          # Group minor+patch updates together; major & security stay separate
          pre-commit-minor:
              applies-to: "version-updates"
              update-types:
                  - "patch"
                  - "minor"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"

    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
      commit-message:
          prefix: "chore"
          include: "scope"
      groups:
          # Group minor+patch npm updates together; major & security stay separate
          minor-updates:
              applies-to: "version-updates"
              update-types:
                  - "patch"
                  - "minor"
              exclude-patterns:
                  # Often requires manual intervention to fix new rules
                  - "oxlint"
