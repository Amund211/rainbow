default_stages: [pre-commit, pre-push]
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: mixed-line-ending
          - id: check-yaml
          - id: sort-simple-yaml
          - id: check-merge-conflict
          - id: check-added-large-files

    - repo: https://github.com/oxc-project/mirrors-oxfmt
      rev: 3c7999c43590548921418ba746ae49d2c0851222  # v0.41.0 - no version tags yet, use commit SHA
      hooks:
          - id: oxfmt
            additional_dependencies: ["oxfmt@0.41.0"]

    - repo: local
      hooks:
          - id: eslint
            name: ESLint
            entry: npm run "lint:fix"
            language: system
            pass_filenames: false
          - id: test
            name: Test
            entry: npm run 'test:unit'
            language: system
            pass_filenames: false
          - id: typecheck
            name: Check types
            entry: npm run tsc
            language: system
            pass_filenames: false
